          "acceptedAnswer": {
            "@type": "Answer",
            "text": "COLREGS (International Regulations for Preventing Collisions at Sea) are international maritime safety rules that govern vessel navigation and collision prevention on the world's oceans and connected waterways."

        },

          "name": "Who needs to learn COLREGS?",

            "@type": "Answer",

        },

          "@type": "Question",
          "name": "How many rules are in COLREGS?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "COLREGS contains 38 rules organized into 5 parts: General (Rules 1-3), Steering and Sailing Rules (Rules 4-19), Lights and Shapes (Rules 20-31), Sound and Light Signals (Rules 32-37), and Exemptions (Rule 38)."

        }
